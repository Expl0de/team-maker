<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Usage — Team Maker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #cba6f7;
    }
    .team-selector {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .team-selector label {
      font-size: 13px;
      color: #a6adc8;
    }
    .team-selector select {
      background: #181825;
      border: 1px solid #313244;
      border-radius: 6px;
      padding: 6px 12px;
      color: #cdd6f4;
      font-size: 13px;
      outline: none;
    }
    .team-selector select:focus { border-color: #cba6f7; }
    .auto-refresh {
      font-size: 11px;
      color: #6c7086;
    }

    /* Summary cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .summary-card {
      background: #181825;
      border: 1px solid #313244;
      border-radius: 10px;
      padding: 16px;
    }
    .summary-card .label {
      font-size: 11px;
      color: #6c7086;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .summary-card .value {
      font-size: 22px;
      font-weight: 700;
      color: #cdd6f4;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }
    .summary-card .value.cost { color: #a6e3a1; }
    .summary-card .value.tokens { color: #89b4fa; }
    .summary-card .value.duration { color: #f9e2af; }

    /* Agent table */
    h2 {
      font-size: 15px;
      font-weight: 600;
      color: #a6adc8;
      margin-bottom: 12px;
    }
    .agent-table {
      width: 100%;
      border-collapse: collapse;
      background: #181825;
      border: 1px solid #313244;
      border-radius: 10px;
      overflow: hidden;
    }
    .agent-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6c7086;
      padding: 10px 14px;
      background: #11111b;
      border-bottom: 1px solid #313244;
    }
    .agent-table td {
      font-size: 13px;
      padding: 10px 14px;
      border-bottom: 1px solid #313244;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }
    .agent-table tr:last-child td { border-bottom: none; }
    .agent-table tr:hover td { background: #1e1e2e; }
    .agent-name {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 500;
    }
    .role-badge {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
      background: #313244;
      color: #cba6f7;
      margin-left: 6px;
    }
    .role-badge.agent { color: #89b4fa; }
    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .status-dot.running { background: #a6e3a1; }
    .status-dot.exited { background: #f38ba8; }
    .cost-cell { color: #a6e3a1; }
    .token-cell { color: #89b4fa; }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #6c7086;
      font-size: 14px;
    }

    /* All teams overview */
    .all-teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .team-card {
      background: #181825;
      border: 1px solid #313244;
      border-radius: 10px;
      padding: 18px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .team-card:hover {
      border-color: #cba6f7;
      background: #1e1e2e;
    }
    .team-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .team-card-name {
      font-size: 15px;
      font-weight: 600;
      color: #cba6f7;
    }
    .team-card-agents {
      font-size: 11px;
      color: #6c7086;
    }
    .team-card-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .team-card-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .team-card-stat .label {
      font-size: 10px;
      color: #6c7086;
      text-transform: uppercase;
    }
    .team-card-stat .value {
      font-size: 15px;
      font-weight: 600;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }
  </style>
</head>
<body>
  <header>
    <h1>Team Usage</h1>
    <div class="team-selector">
      <label for="team-select">Team:</label>
      <select id="team-select">
        <option value="">All Teams</option>
      </select>
      <span class="auto-refresh">Auto-refreshes every 5s</span>
    </div>
  </header>

  <div id="content">
    <div class="empty-state">Loading...</div>
  </div>

  <script>
    const teamSelect = document.getElementById("team-select");
    const content = document.getElementById("content");

    function formatTokens(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
      if (n >= 1000) return (n / 1000).toFixed(1) + "k";
      return n.toLocaleString();
    }

    function formatCost(n) {
      return "$" + n.toFixed(4);
    }

    function formatDuration(ms) {
      const secs = Math.floor(ms / 1000);
      const mins = Math.floor(secs / 60);
      const hrs = Math.floor(mins / 60);
      if (hrs > 0) return `${hrs}h ${mins % 60}m`;
      if (mins > 0) return `${mins}m ${secs % 60}s`;
      return `${secs}s`;
    }

    function formatBytes(b) {
      if (b >= 1048576) return (b / 1048576).toFixed(1) + " MB";
      if (b >= 1024) return (b / 1024).toFixed(1) + " KB";
      return b + " B";
    }

    function renderSummary(totals) {
      // Use input+output breakdown if available, otherwise fall back to compact totalTokens
      const detailedTokens = totals.inputTokens + totals.outputTokens;
      const totalTokens = detailedTokens > 0 ? detailedTokens : (totals.totalTokens || 0);
      return `
        <div class="summary-grid">
          <div class="summary-card">
            <div class="label">Total Cost</div>
            <div class="value cost">${formatCost(totals.cost)}</div>
          </div>
          <div class="summary-card">
            <div class="label">Total Tokens</div>
            <div class="value tokens">${formatTokens(totalTokens)}</div>
          </div>
          <div class="summary-card">
            <div class="label">Input Tokens</div>
            <div class="value tokens">${formatTokens(totals.inputTokens)}</div>
          </div>
          <div class="summary-card">
            <div class="label">Output Tokens</div>
            <div class="value tokens">${formatTokens(totals.outputTokens)}</div>
          </div>
          <div class="summary-card">
            <div class="label">Cache Read</div>
            <div class="value tokens">${formatTokens(totals.cacheRead)}</div>
          </div>
          <div class="summary-card">
            <div class="label">Cache Create</div>
            <div class="value tokens">${formatTokens(totals.cacheWrite)}</div>
          </div>
          <div class="summary-card">
            <div class="label">Duration</div>
            <div class="value duration">${formatDuration(totals.durationMs)}</div>
          </div>
          <div class="summary-card">
            <div class="label">Data I/O</div>
            <div class="value">${formatBytes(totals.bytesIn + totals.bytesOut)}</div>
          </div>
        </div>
      `;
    }

    function renderAgentTable(agents) {
      if (!agents || agents.length === 0) return '<div class="empty-state">No agents</div>';
      const rows = agents.map(a => {
        const roleLabel = a.role === "main" ? "main" : (a.agentIndex || "?");
        const roleClass = a.role === "main" ? "" : " agent";
        const statusClass = a.status === "running" ? "running" : "exited";
        const detailedTokens = a.tokenUsage.inputTokens + a.tokenUsage.outputTokens;
        const totalTokens = detailedTokens > 0 ? detailedTokens : (a.tokenUsage.totalTokens || 0);
        return `
          <tr>
            <td>
              <span class="status-dot ${statusClass}"></span>
              <span class="agent-name">${a.name}</span>
              <span class="role-badge${roleClass}">${roleLabel}</span>
            </td>
            <td class="cost-cell">${formatCost(a.tokenUsage.cost)}</td>
            <td class="token-cell">${formatTokens(totalTokens)}</td>
            <td class="token-cell">${formatTokens(a.tokenUsage.inputTokens)}</td>
            <td class="token-cell">${formatTokens(a.tokenUsage.outputTokens)}</td>
            <td class="token-cell">${formatTokens(a.tokenUsage.cacheRead)}</td>
            <td class="token-cell">${formatTokens(a.tokenUsage.cacheWrite)}</td>
            <td>${formatBytes(a.usage.bytesIn)}</td>
            <td>${formatBytes(a.usage.bytesOut)}</td>
            <td>${formatDuration(a.usage.durationMs)}</td>
          </tr>
        `;
      }).join("");

      return `
        <h2>Agent Breakdown</h2>
        <table class="agent-table">
          <thead>
            <tr>
              <th>Agent</th>
              <th>Cost</th>
              <th>Tokens</th>
              <th>Input</th>
              <th>Output</th>
              <th>Cache Read</th>
              <th>Cache Write</th>
              <th>Bytes In</th>
              <th>Bytes Out</th>
              <th>Duration</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    async function renderTeamUsage(teamId) {
      try {
        const res = await fetch(`/api/teams/${teamId}/usage`);
        if (!res.ok) throw new Error("Team not found");
        const data = await res.json();
        content.innerHTML = renderSummary(data.totals) + renderAgentTable(data.agents);
      } catch (err) {
        content.innerHTML = `<div class="empty-state">Error loading usage: ${err.message}</div>`;
      }
    }

    async function renderAllTeams() {
      try {
        const res = await fetch("/api/teams");
        const teamsList = await res.json();
        if (teamsList.length === 0) {
          content.innerHTML = '<div class="empty-state">No teams yet. Create a team to see usage.</div>';
          return;
        }

        // Fetch usage for all teams in parallel
        const usageResults = await Promise.all(
          teamsList.map(async (t) => {
            try {
              const r = await fetch(`/api/teams/${t.id}/usage`);
              return await r.json();
            } catch { return null; }
          })
        );

        // Compute grand totals
        const grandTotals = {
          inputTokens: 0, outputTokens: 0, cacheRead: 0, cacheWrite: 0,
          cost: 0, totalTokens: 0, bytesIn: 0, bytesOut: 0, durationMs: 0,
        };
        for (const u of usageResults) {
          if (!u) continue;
          grandTotals.inputTokens += u.totals.inputTokens;
          grandTotals.outputTokens += u.totals.outputTokens;
          grandTotals.cacheRead += u.totals.cacheRead;
          grandTotals.cacheWrite += u.totals.cacheWrite;
          grandTotals.cost += u.totals.cost;
          grandTotals.totalTokens += u.totals.totalTokens || 0;
          grandTotals.bytesIn += u.totals.bytesIn;
          grandTotals.bytesOut += u.totals.bytesOut;
          if (u.totals.durationMs > grandTotals.durationMs) grandTotals.durationMs = u.totals.durationMs;
        }

        let html = renderSummary(grandTotals);
        html += '<h2>Teams</h2><div class="all-teams-grid">';

        for (let i = 0; i < teamsList.length; i++) {
          const t = teamsList[i];
          const u = usageResults[i];
          const totals = u ? u.totals : { inputTokens: 0, outputTokens: 0, totalTokens: 0, cost: 0, durationMs: 0 };
          const agentCount = u ? u.agents.length : 0;
          const detailedTokens = totals.inputTokens + totals.outputTokens;
          const totalTokens = detailedTokens > 0 ? detailedTokens : (totals.totalTokens || 0);
          html += `
            <div class="team-card" data-team-id="${t.id}">
              <div class="team-card-header">
                <span class="team-card-name">${t.name}</span>
                <span class="team-card-agents">${agentCount} agent${agentCount !== 1 ? "s" : ""}</span>
              </div>
              <div class="team-card-stats">
                <div class="team-card-stat">
                  <span class="label">Cost</span>
                  <span class="value cost-cell">${formatCost(totals.cost)}</span>
                </div>
                <div class="team-card-stat">
                  <span class="label">Tokens</span>
                  <span class="value token-cell">${formatTokens(totalTokens)}</span>
                </div>
                <div class="team-card-stat">
                  <span class="label">Duration</span>
                  <span class="value">${formatDuration(totals.durationMs)}</span>
                </div>
                <div class="team-card-stat">
                  <span class="label">Data I/O</span>
                  <span class="value">${formatBytes(totals.bytesIn + totals.bytesOut)}</span>
                </div>
              </div>
            </div>
          `;
        }
        html += '</div>';
        content.innerHTML = html;

        // Click to drill into team
        content.querySelectorAll(".team-card").forEach(card => {
          card.addEventListener("click", () => {
            const tid = card.dataset.teamId;
            teamSelect.value = tid;
            refresh();
          });
        });
      } catch (err) {
        content.innerHTML = `<div class="empty-state">Error: ${err.message}</div>`;
      }
    }

    async function loadTeamList() {
      try {
        const res = await fetch("/api/teams");
        const teamsList = await res.json();
        // Keep the "All Teams" option, add team options
        while (teamSelect.options.length > 1) teamSelect.remove(1);
        for (const t of teamsList) {
          const opt = document.createElement("option");
          opt.value = t.id;
          opt.textContent = t.name;
          teamSelect.appendChild(opt);
        }
      } catch {}
    }

    function refresh() {
      const teamId = teamSelect.value;
      if (teamId) {
        renderTeamUsage(teamId);
      } else {
        renderAllTeams();
      }
    }

    teamSelect.addEventListener("change", refresh);

    // Check URL params for pre-selected team
    const params = new URLSearchParams(window.location.search);
    const preselectedTeam = params.get("team");

    async function init() {
      await loadTeamList();
      if (preselectedTeam) {
        teamSelect.value = preselectedTeam;
      }
      refresh();
    }

    init();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
